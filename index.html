<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Trivia Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <header id="header">
      <div id="title-area">
        <h1>Family Trivia</h1>
        <div id="round-display"></div>
      </div>
      <div id="controls">
        <button id="play-btn">Play</button>
        <button id="restart-btn">Restart Round</button>
      </div>
      <div id="status-indicators">
        <!-- green/red squares appear here -->
      </div>
    </header>

    <main>
      <section id="grid-section">
        <div id="grid"></div>
      </section>

      <section id="qa-section" class="hidden">
        <div id="person-info">
          <div id="person-name"></div>
          <img id="person-photo" src="" alt="">
        </div>
        <div id="question-area">
          <p id="question-text"></p>
          <p id="choose-prompt">Choose your answer carefully.</p>
          <form id="answers-form"></form>
          <div id="anecdote" class="hidden"></div>
          <button id="continue-btn" class="hidden">Continue</button>
        </div>
      </section>
    </main>
  </div>

  <audio id="sound-correct" src="sounds/correct.mp3"></audio>
  <audio id="sound-incorrect" src="sounds/incorrect.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
